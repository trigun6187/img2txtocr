[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  [headers]
    Content-Type = "text/html; charset=utf-8"

[build]
  command = ""
  publish = "."

# Netlify deployment configuration for static HTML site
# To deploy: netlify deploy --prod or netlify deploy --site=<site-name>
# Requires authentication via NETLIFY_AUTH_TOKEN environment variable or login first
